name: Build Mac App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile program
        run: clang mac/Foryou.c -o Foryou

      - name: Create app structure
        run: |
          mkdir -p Love.app/Contents/MacOS
          cp Foryou Love.app/Contents/MacOS/
          cp mac/LoveLanguage.mp3 Love.app/Contents/MacOS/

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Love-app
          path: Love.app
