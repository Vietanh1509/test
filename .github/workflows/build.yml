name: Build Mac App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile program
        run: clang mac/Foryou.c -o Foryou

      - name: Prepare package
        run: |
          mkdir release
          cp Foryou release/
          cp mac/LoveLanguage.mp3 release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: release
